<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wrap Up Assessment — Test Overlay Mock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&family=Lora:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --font-primary: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        --font-heading: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
        --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        --glass-bg: rgba(255, 255, 255, 0.06);
        --glass-border: rgba(255, 255, 255, 0.18);
        --glass-shadow: 0 28px 80px rgba(2, 12, 32, 0.55);
        --accent: #c4e538;
        --accent-glow: rgba(196, 229, 56, 0.2);
        --text-primary: #e2e8f0;
        --text-secondary: rgba(226, 232, 240, 0.78);
        --text-muted: rgba(148, 163, 184, 0.65);
        --danger: #f87171;
        --success: #4ade80;
        --card-bg: rgba(15, 23, 42, 0.68);
        --card-border: rgba(148, 163, 184, 0.22);
        --choice-bg: rgba(15, 27, 64, 0.55);
        --choice-border: rgba(38, 64, 140, 0.45);
        --choice-selected: rgba(196, 229, 56, 0.22);
        --choice-hover: rgba(228, 255, 82, 0.38);
        --top-accent-rgb: 0, 8, 34;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        font-family: var(--font-primary);
        color: var(--text-primary);
        background: linear-gradient(145deg, #05060d 0%, #14172b 48%, #0b1020 100%);
        position: relative;
        overflow-x: hidden;
      }

      body::before,
      body::after {
        content: '';
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(circle at 20% 20%, rgba(196, 229, 56, 0.12), transparent 45%),
          radial-gradient(circle at 80% 10%, rgba(139, 92, 246, 0.12), transparent 50%),
          radial-gradient(circle at 50% 80%, rgba(59, 130, 246, 0.1), transparent 45%);
        filter: blur(80px);
      }

      body::after {
        background: radial-gradient(circle at 15% 80%, rgba(16, 185, 129, 0.18), transparent 55%);
        opacity: 0.6;
        mix-blend-mode: screen;
      }

      #root {
        position: relative;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: clamp(16px, 4vw, 48px);
      }

      .overlay-shell {
        width: min(1120px, 100%);
        background: var(--glass-bg);
        border-radius: 32px;
        border: 1px solid var(--glass-border);
        box-shadow: var(--glass-shadow);
        backdrop-filter: blur(48px) saturate(160%);
        -webkit-backdrop-filter: blur(48px) saturate(160%);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .overlay-header {
        padding: clamp(28px, 6vw, 40px);
        background: linear-gradient(135deg, rgba(15, 23, 42, 0.92), rgba(12, 18, 36, 0.92));
        position: relative;
        overflow: visible;
      }

      .overlay-header::after {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 15% 20%, rgba(196, 229, 56, 0.15), transparent 60%),
          radial-gradient(circle at 85% 30%, rgba(96, 165, 250, 0.12), transparent 60%);
        opacity: 0.9;
      }

      .overlay-header-content {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .module-heading {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .module-subtitle {
        font-size: 0.95rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: rgba(226, 232, 240, 0.65);
        font-weight: 800;
        text-decoration: underline;
        text-decoration-thickness: 3px;
        text-underline-offset: 3px;
      }

      .module-title {
        font-size: clamp(1.85rem, 4.2vw, 2.4rem);
        font-weight: 700;
        background: linear-gradient(120deg, #86efac 0%, #c4e538 50%, #a5f3fc 100%);
        -webkit-background-clip: text;
        color: transparent;
      }

      .overlay-body {
        padding: clamp(28px, 6vw, 40px);
        display: flex;
        flex-direction: column;
        gap: 28px;
        background: linear-gradient(180deg, rgba(4, 9, 18, 0.72) 0%, rgba(7, 11, 24, 0.88) 100%);
      }

      .assessment-grid {
        display: grid;
        gap: 24px;
      }

      .question-card {
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: clamp(20px, 3.6vw, 26px);
        background-color: rgba(13, 19, 33, 0.92);
        background-image: linear-gradient(180deg, rgba(196, 229, 56, 0.28), rgba(13, 19, 33, 0)),
          linear-gradient(180deg, rgba(196, 229, 56, 0.28), rgba(13, 19, 33, 0)),
          linear-gradient(180deg, rgba(var(--top-accent-rgb), 0.86) 0%, rgba(var(--top-accent-rgb), 0.86) 0%, rgba(var(--top-accent-rgb), 0) 100%);
        background-repeat: no-repeat, no-repeat, no-repeat;
        background-size: 4px 100%, 4px 100%, 100% 50px;
        background-position: left center, right center, top center;
        border: 1px solid rgba(148, 163, 184, 0.24);
        border-radius: 20px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03), 0 18px 42px rgba(8, 12, 24, 0.38);
        min-width: 0;
        overflow: visible;
      }

            .question-card > * {
        position: relative;
        z-index: 1;
      }


            .question-card > * {
        position: relative;
        z-index: 1;
      }

      .question-header {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .question-top {
        display: none;
      }

      .question-stem-wrapper {
        position: relative;
        margin-top: 24px;
      }

      .question-stem-meta {
        position: absolute;
        top: -15px;
        left: 20px;
        right: 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        z-index: 2;
      }

      .question-stem-meta .question-index,
      .question-stem-meta .label-chip {
        text-transform: uppercase;
        color: rgba(226, 232, 240, 0.78);
        letter-spacing: 0.12em;
        font-weight: 800;
        white-space: nowrap;
        font-style: italic;
        display: inline-flex;
        align-items: center;
        background: rgba(15, 23, 42, 1);
        border: none;
        border-radius: 999px;
        box-shadow: 0 12px 30px rgba(8, 12, 24, 0.38);
        text-shadow: 0 0 8px rgba(226, 232, 240, 0.45);
      }

      .question-stem-meta .question-index {
        font-size: 0.7rem;
        padding: 6px 22px;
        color: rgba(196, 229, 56, 0.85);
        border: 1px solid rgba(196, 229, 56, 0.45);
      }

      .question-stem-meta .label-chip {
        font-size: 0.55rem;
        padding: 5px 12px;
        margin-left: auto;
        border: 1px solid rgba(196, 229, 56, 0.45);
      }

      .question-stem {
        font-size: 0.95rem;
        line-height: 1.55;
        color: rgba(200, 220, 255, 0.92);
        font-weight: 400;
        letter-spacing: normal;
        word-spacing: 0.1em;
        text-align: justify;
        font-family: 'Lora', 'Times New Roman', serif;
        margin-top: 0;
        padding: 28px 20px 18px;
        background: linear-gradient(135deg, rgba(30, 64, 175, 0.25), rgba(56, 189, 248, 0.12));
        border-radius: 20px;
        border: 1px solid rgba(196, 229, 56, 0.45);
        box-shadow: none;
      }

      .code-block {
        width: 100%;
        font-family: var(--font-mono);
        font-size: 0.9rem;
        line-height: 1.55;
        background: rgba(15, 23, 42, 0.86);
        border: 1px solid rgba(148, 163, 184, 0.28);
        border-radius: 16px;
        padding: 18px 20px;
        color: rgba(226, 232, 240, 0.92);
        overflow-x: auto;
      }

      .choices {
        display: grid;
        gap: 10px;
      }

      .choice {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 10px 12px;
        border-radius: 12px;
        background: var(--choice-bg);
        border: none;
        transition: transform 160ms ease, background 160ms ease, box-shadow 160ms ease;
        width: 100%;
        text-align: left;
        color: inherit;
        cursor: pointer;
        outline: none;
      }

      .choice.is-selected {
        background: var(--choice-selected);
        box-shadow: 0 0 0 1px rgba(196, 229, 56, 0.3);
      }

      .choice:hover {
        transform: translateY(-2px);
        box-shadow: 0 18px 28px rgba(6, 14, 38, 0.45);
        background: var(--choice-hover);
      }

      .choice.is-selected:hover {
        transform: translateY(-3px);
        background: rgba(228, 255, 82, 0.38);
      }

      .choice:disabled,
      .choice:disabled:hover {
        cursor: default;
        transform: none;
        box-shadow: none;
        background: rgba(12, 22, 58, 0.32);
      }

      .choice.is-selected:disabled,
      .choice.is-selected:disabled:hover {
        background: var(--choice-selected);
        box-shadow: 0 0 0 1px rgba(196, 229, 56, 0.3);
        color: inherit;
      }

      .choice-key {
        font-weight: 700;
        font-size: 0.85rem;
        color: rgba(226, 232, 240, 0.88);
        background: rgba(148, 163, 184, 0.12);
        border-radius: 10px;
        padding: 2px 7px;
      }

      .choice-text {
        flex: 1;
        font-size: 0.88rem;
        line-height: 1.45;
        color: var(--text-secondary);
      }

      .feedback {
        display: grid;
        gap: 14px;
        padding: 16px 18px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .feedback.correct {
        background: linear-gradient(120deg, rgba(22, 163, 74, 0.12), rgba(16, 185, 129, 0.08));
        border-color: rgba(74, 222, 128, 0.32);
      }

      .feedback.incorrect {
        background: linear-gradient(120deg, rgba(248, 113, 113, 0.18), rgba(239, 68, 68, 0.08));
        border-color: rgba(248, 113, 113, 0.28);
      }

      .feedback-header {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.88rem;
        font-weight: 600;
        text-transform: uppercase;
      }

      .feedback-header.correct {
        color: var(--success);
      }

      .feedback-header.incorrect {
        color: var(--danger);
      }

      .feedback-body {
        display: grid;
        gap: 10px;
        font-size: 0.92rem;
        line-height: 1.55;
        color: rgba(226, 232, 240, 0.9);
      }

      .insight {
        font-size: 0.88rem;
        line-height: 1.5;
        color: rgba(226, 232, 240, 0.78);
        background: rgba(15, 23, 42, 0.46);
        border-radius: 12px;
        padding: 12px 14px;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .insight strong {
        color: rgba(196, 229, 56, 0.92);
        font-weight: 600;
      }

      .overlay-footer {
        padding: clamp(20px, 5vw, 32px) clamp(28px, 6vw, 40px) clamp(28px, 6vw, 40px);
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 20px;
        border-top: 1px solid rgba(255, 255, 255, 0.04);
        background: linear-gradient(180deg, rgba(10, 11, 24, 0.88) 0%, rgba(6, 8, 18, 0.92) 100%);
      }

      .footer-copy {
        font-size: 0.92rem;
        color: var(--text-muted);
        line-height: 1.6;
        max-width: 560px;
      }

      .cta-button {
        padding: 14px 26px;
        border-radius: 999px;
        border: none;
        font-size: 0.9rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        background: linear-gradient(135deg, #c4e538 0%, #a3e635 100%);
        color: #07110f;
        box-shadow: 0 16px 38px rgba(196, 229, 56, 0.4);
        cursor: pointer;
        transition: transform 160ms ease, box-shadow 160ms ease;
      }

      .cta-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 22px 48px rgba(196, 229, 56, 0.45);
      }

      .cta-button:active {
        transform: translateY(0);
        box-shadow: 0 12px 32px rgba(196, 229, 56, 0.3);
      }

      .cta-button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      @media (max-width: 768px) {
        .question-card { padding: 20px; }
        .overlay-header { padding: 24px; }
        .overlay-footer { flex-direction: column; align-items: stretch; }
        .cta-button { width: 100%; text-align: center; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const initialQuestions = [
        {
          id: 'Q9',
          label: 'Tree Algorithms',
          type: 'snippet',
          prompt:
            'C++ Code Snippet: The "Dual Information Challenge" in Practice\n\nThis C++ function attempts to find the diameter of a binary tree. Assume it is used in a single-threaded environment. What is the most accurate assessment of this code?',
          code: `int overall_diameter = 0;

int find_height_and_update_diameter(TreeNode* node) {
    if (!node) return 0;
    int leftHeight = find_height_and_update_diameter(node->left);
    int rightHeight = find_height_and_update_diameter(node->right);
    
    // A path through the current node as the apex
    overall_diameter = std::max(overall_diameter, leftHeight + rightHeight);
    
    return 1 + std::max(leftHeight, rightHeight);
}`,
          choices: [
            {
              key: 'A',
              text: 'The overall_diameter calculation is incorrect; it should be leftHeight + rightHeight + 1.',
            },
            {
              key: 'B',
              text: 'The use of a global or member variable for overall_diameter is a fundamentally flawed recursive pattern.',
            },
            {
              key: 'C',
              text: 'The function incorrectly calculates the height; the return value is wrong.',
            },
            {
              key: 'D',
              text: 'The function correctly solves the "Dual Information Challenge" by returning the necessary local information (height) while updating a shared, non-local state with global information (max diameter candidate).',
            },
          ],
          selectedChoice: null,
          correctChoice: 'D',
          explanation:
            'Diameter needs both the local height for parent callers and a global best seen so far. The function returns height and simultaneously updates a shared diameter accumulator—this is the canonical solution and does not require adding 1 to the chord length.',
          insight:
            'Interviewers use this pattern to see if you can juggle “dual information.” The trick is keeping the recursion signature narrow while threading a global accumulator. Candidates who insist the answer must be returned upward reveal a rigidity that breaks under real-world tree metrics.',
        },
        {
          id: 'Q10',
          label: 'BST Traversal',
          type: 'concept',
          prompt:
            'Propagating Information Upward: Sentinel Values\n\nA recursive function int findKthSmallest(Node* node, int& k) is designed to find the Kth smallest element in a BST. It uses in-order traversal logic. What would be a good sentinel value for this function to return to indicate that the Kth element was found in a deeper recursive call and all parent calls should stop their search and propagate this signal?',
          choices: [
            {
              key: 'A',
              text: 'nullptr, as the node pointer is what we are looking for.',
            },
            {
              key: 'B',
              text: 'INT_MAX (or INT_MIN), a value outside the expected range of node values.',
            },
            {
              key: 'C',
              text: 'The value of the found node itself. This is sufficient to stop the search.',
            },
            {
              key: 'D',
              text: 'Throwing an exception is the only safe way to achieve early termination.',
            },
          ],
          selectedChoice: null,
          correctChoice: 'C',
          explanation:
            'Once the k-th node is discovered, bubbling its value upward lets every ancestor skip further traversal. Using a magic constant risks clashing with valid data, and exceptions are unnecessary overhead when a plain value carries the signal.',
          insight:
            'We hide this in BST drills to expose who understands “propagate real data upward.” Interviewers set the trap by nudging candidates toward sentinel constants; the real screen is whether you notice that the desired value itself is the clean termination signal.',
        },
      ];

      const FeedbackBlock = ({ question, showAnswers }) => {
        if (!showAnswers) return null;
        const status = question.selectedChoice === question.correctChoice ? 'correct' : 'incorrect';
        const title = status === 'correct' ? 'Correct • Great instincts' : 'Incorrect • Let\'s tighten the approach';

        return (
          <div className={`feedback ${status}`}>
            <div className={`feedback-header ${status}`}>{title}</div>
            <div className="feedback-body">
              <div>
                <strong>Explanation:</strong> {question.explanation}
              </div>
              <div className="insight">
                <strong>Interviewer Insight:</strong> {question.insight}
              </div>
            </div>
          </div>
        );
      };

      const Choice = ({ choice, isSelected, isCorrect, isDisabled, onSelect, showAnswers }) => (
        <button
          type="button"
          className={`choice ${isSelected ? 'is-selected' : ''} ${showAnswers ? 'revealed' : ''}`}
          disabled={isDisabled}
          onClick={() => !isDisabled && onSelect(choice.key)}
        >
          <span className="choice-key">{choice.key}</span>
          <p className="choice-text">{choice.text}</p>
          {isSelected && showAnswers && (
            <span style={{ fontSize: '0.78rem', fontWeight: 600, color: isCorrect ? 'var(--success)' : 'var(--danger)' }}>
              {isCorrect ? 'Your Answer • Correct' : 'Your Answer'}
            </span>
          )}
        </button>
      );

      const QuestionCard = ({ question, index, showAnswers, onSelectChoice }) => (
        <section className="question-card">
          <div className="question-header">
            <div className="question-stem-wrapper">
              <div className="question-stem-meta">
                <span className="question-index">Question {index + 1}</span>
                <span className="label-chip">{question.type === 'snippet' ? 'C++ Snippet' : 'Conceptual'}</span>
              </div>
              <p className="question-stem">{question.prompt}</p>
            </div>
          </div>
          {question.code && (
            <pre className="code-block"><code>{question.code}</code></pre>
          )}
          <div className="choices">
            {question.choices.map((choice) => (
              <Choice
                key={choice.key}
                choice={choice}
                isSelected={choice.key === question.selectedChoice}
                isCorrect={choice.key === question.correctChoice}
                isDisabled={showAnswers}
                showAnswers={showAnswers}
                onSelect={(key) => onSelectChoice(question.id, key)}
              />
            ))}
          </div>
          <FeedbackBlock question={question} showAnswers={showAnswers} />
        </section>
      );

      const AssessmentOverlay = () => {
        const [questions, setQuestions] = React.useState(initialQuestions);
        const [showAnswers, setShowAnswers] = React.useState(false);
        const handleSelectChoice = (questionId, choiceKey) => {
          setQuestions((prev) =>
            prev.map((q) =>
              q.id === questionId
                ? {
                    ...q,
                    selectedChoice: q.selectedChoice === choiceKey ? null : choiceKey,
                  }
                : q
            )
          );
        };

        const total = questions.length;
        const correct = questions.filter((q) => q.selectedChoice === q.correctChoice).length;
        return (
          <div className="overlay-shell">
            <div className="overlay-header">
              <div className="overlay-header-content">
                <div className="module-heading">
                  <span className="module-subtitle">Module Wrap Up</span>
                  <h1 className="module-title">Recursion · Graph Search · Binary Invariants</h1>
                </div>
              </div>
            </div>

            <div className="overlay-body">
              <div className="assessment-grid">
                {questions.map((question, index) => (
                  <QuestionCard
                    key={question.id}
                    question={question}
                    index={index}
                    showAnswers={showAnswers}
                    onSelectChoice={handleSelectChoice}
                  />
                ))}
              </div>
            </div>

            <div className="overlay-footer">
              <p className="footer-copy">
                {showAnswers
                  ? 'Use the explanations and interviewer notes to inform your remediation focus.'
                  : 'Review every prompt thoroughly, selecting the strongest answer for each. When you are ready, reveal the official explanations to verify your reasoning.'}
              </p>
              {showAnswers ? (
                <button className="cta-button">Proceed to Remediation</button>
              ) : (
                <button className="cta-button" onClick={() => setShowAnswers(true)} disabled={questions.some((q) => !q.selectedChoice)}>
                  {questions.some((q) => !q.selectedChoice) ? 'Select Answers to Reveal' : 'Reveal Explanations'}
                </button>
              )}
            </div>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<AssessmentOverlay />);
    </script>
  </body>
</html>
