<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wrap Up Assessment — Test Overlay Mock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&family=Lora:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="wrap_up_assessment_test_overlay.css" />
    
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const initialQuestions = [
        {
          id: 'Q9',
          label: 'Tree Algorithms',
          type: 'snippet',
          prompt:
            'C++ Code Snippet: The "Dual Information Challenge" in Practice\n\nThis C++ function attempts to find the diameter of a binary tree. Assume it is used in a single-threaded environment. What is the most accurate assessment of this code?',
          code: `int overall_diameter = 0;

int find_height_and_update_diameter(TreeNode* node) {
    if (!node) return 0;
    int leftHeight = find_height_and_update_diameter(node->left);
    int rightHeight = find_height_and_update_diameter(node->right);
    
    // A path through the current node as the apex
    overall_diameter = std::max(overall_diameter, leftHeight + rightHeight);
    
    return 1 + std::max(leftHeight, rightHeight);
}`,
          choices: [
            {
              key: 'A',
              text: 'The overall_diameter calculation is incorrect; it should be leftHeight + rightHeight + 1.',
            },
            {
              key: 'B',
              text: 'The use of a global or member variable for overall_diameter is a fundamentally flawed recursive pattern.',
            },
            {
              key: 'C',
              text: 'The function incorrectly calculates the height; the return value is wrong.',
            },
            {
              key: 'D',
              text: 'The function correctly solves the "Dual Information Challenge" by returning the necessary local information (height) while updating a shared, non-local state with global information (max diameter candidate).',
            },
          ],
          selectedChoice: null,
          correctChoice: 'D',
          explanation:
            'Diameter needs both the local height for parent callers and a global best seen so far. The function returns height and simultaneously updates a shared diameter accumulator—this is the canonical solution and does not require adding 1 to the chord length.',
          insight:
            'Interviewers use this pattern to see if you can juggle “dual information.” The trick is keeping the recursion signature narrow while threading a global accumulator. Candidates who insist the answer must be returned upward reveal a rigidity that breaks under real-world tree metrics.',
        },
        {
          id: 'Q10',
          label: 'BST Traversal',
          type: 'concept',
          prompt:
            'Propagating Information Upward: Sentinel Values\n\nA recursive function int findKthSmallest(Node* node, int& k) is designed to find the Kth smallest element in a BST. It uses in-order traversal logic. What would be a good sentinel value for this function to return to indicate that the Kth element was found in a deeper recursive call and all parent calls should stop their search and propagate this signal?',
          choices: [
            {
              key: 'A',
              text: 'nullptr, as the node pointer is what we are looking for.',
            },
            {
              key: 'B',
              text: 'INT_MAX (or INT_MIN), a value outside the expected range of node values.',
            },
            {
              key: 'C',
              text: 'The value of the found node itself. This is sufficient to stop the search.',
            },
            {
              key: 'D',
              text: 'Throwing an exception is the only safe way to achieve early termination.',
            },
          ],
          selectedChoice: null,
          correctChoice: 'C',
          explanation:
            'Once the k-th node is discovered, bubbling its value upward lets every ancestor skip further traversal. Using a magic constant risks clashing with valid data, and exceptions are unnecessary overhead when a plain value carries the signal.',
          insight:
            'We hide this in BST drills to expose who understands “propagate real data upward.” Interviewers set the trap by nudging candidates toward sentinel constants; the real screen is whether you notice that the desired value itself is the clean termination signal.',
        },
      ];

      const FeedbackBlock = ({ question, showAnswers }) => {
        if (!showAnswers) return null;
        const status = question.selectedChoice === question.correctChoice ? 'correct' : 'incorrect';
        const title = status === 'correct' ? 'Correct • Great instincts' : 'Incorrect • Let\'s tighten the approach';

        return (
          <div className={`feedback ${status}`}>
            <div className={`feedback-header ${status}`}>{title}</div>
            <div className="feedback-body">
              <div>
                <strong>Explanation:</strong> {question.explanation}
              </div>
              <div className="insight">
                <strong>Interviewer Insight:</strong> {question.insight}
              </div>
            </div>
          </div>
        );
      };

      const Choice = ({ choice, isSelected, isCorrect, isDisabled, onSelect, showAnswers }) => (
        <button
          type="button"
          className={`choice ${isSelected ? 'is-selected' : ''} ${showAnswers ? 'revealed' : ''}`}
          disabled={isDisabled}
          onClick={() => !isDisabled && onSelect(choice.key)}
        >
          <span className="choice-key">{choice.key}</span>
          <p className="choice-text">{choice.text}</p>
          {isSelected && showAnswers && (
            <span className={`choice-status ${isCorrect ? 'correct' : 'incorrect'}`}>
              {isCorrect ? 'Your Answer • Correct' : 'Your Answer'}
            </span>
          )}
        </button>
      );

      const QuestionCard = ({ question, index, showAnswers, onSelectChoice }) => (
        <section className="question-card">
          <div className="question-header">
            <div className="question-stem-wrapper">
              <div className="question-stem-meta">
                <span className="question-index">Question {index + 1}</span>
                <span className="label-chip">{question.type === 'snippet' ? 'C++ Snippet' : 'Conceptual'}</span>
              </div>
              <p className="question-stem">{question.prompt}</p>
            </div>
          </div>
          {question.code && (
            <pre className="code-block"><code>{question.code}</code></pre>
          )}
          <div className="choices">
            {question.choices.map((choice) => (
              <Choice
                key={choice.key}
                choice={choice}
                isSelected={choice.key === question.selectedChoice}
                isCorrect={choice.key === question.correctChoice}
                isDisabled={showAnswers}
                showAnswers={showAnswers}
                onSelect={(key) => onSelectChoice(question.id, key)}
              />
            ))}
          </div>
          <FeedbackBlock question={question} showAnswers={showAnswers} />
        </section>
      );

      const AssessmentOverlay = () => {
        const [questions, setQuestions] = React.useState(initialQuestions);
        const [showAnswers, setShowAnswers] = React.useState(false);
        const handleSelectChoice = (questionId, choiceKey) => {
          setQuestions((prev) =>
            prev.map((q) =>
              q.id === questionId
                ? {
                    ...q,
                    selectedChoice: q.selectedChoice === choiceKey ? null : choiceKey,
                  }
                : q
            )
          );
        };

        const total = questions.length;
        const correct = questions.filter((q) => q.selectedChoice === q.correctChoice).length;
        return (
          <div className="overlay-shell">
            <div className="overlay-body">
              <div className="assessment-grid">
                {questions.map((question, index) => (
                  <QuestionCard
                    key={question.id}
                    question={question}
                    index={index}
                    showAnswers={showAnswers}
                    onSelectChoice={handleSelectChoice}
                  />
                ))}
              </div>
            </div>

            <div className="overlay-footer">
              <p className="footer-copy">
                {showAnswers
                  ? 'Use the explanations and interviewer notes to inform your remediation focus.'
                  : 'Review every prompt thoroughly, selecting the strongest answer for each. When you are ready, reveal the official explanations to verify your reasoning.'}
              </p>
              {showAnswers ? (
                <button className="cta-button">Proceed to Remediation</button>
              ) : (
                <button className="cta-button" onClick={() => setShowAnswers(true)} disabled={questions.some((q) => !q.selectedChoice)}>
                  {questions.some((q) => !q.selectedChoice) ? 'Select Answers to Reveal' : 'Reveal Explanations'}
                </button>
              )}
            </div>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<AssessmentOverlay />);
    </script>
  </body>
</html>
