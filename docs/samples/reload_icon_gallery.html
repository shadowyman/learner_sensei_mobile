<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Reload Icon Gallery</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      padding: 32px;
      background: #00040f;
      font-family: 'Inter', system-ui, sans-serif;
      color: #e2e8f0;
    }
    h1 { font-size: 1.55rem; margin-bottom: 10px; }
    p { margin: 0 0 26px; color: #94a3b8; max-width: 720px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 26px;
    }
    .item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .item span {
      font-size: 0.88rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #cbd5f5;
    }
    .reload-btn {
      width: 120px;
      height: 120px;
      border-radius: 30px;
      border: 2px solid color-mix(in srgb, var(--accent, #22c55e) 55%, transparent);
      background: color-mix(in srgb, var(--accent, #22c55e) 18%, transparent);
      color: var(--accent, #22c55e);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      cursor: pointer;
    }
    .reload-btn:hover {
      transform: translateY(-4px);
      border-color: var(--accent, #22c55e);
      background: color-mix(in srgb, var(--accent, #22c55e) 30%, transparent);
    }
    .reload-btn svg {
      width: 60px;
      height: 60px;
      stroke: currentColor;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>
<body>
  <h1>Reload Icon Variations</h1>
  <p>Each icon is an open circular arrow. Markers generate the arrowheads so they sit flush with the arc tangent—no misaligned tips.</p>
  <div class="grid">

    <div class="item">
      <button class="reload-btn" style="--accent:#22c55e">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <defs>
            <marker id="arrow1" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto" markerUnits="strokeWidth">
              <path d="M0,0 L8,4 L0,8 Z" fill="currentColor" />
            </marker>
          </defs>
          <path d="M7 16 A7 7 0 1 1 18.5 8.5" stroke-width="2.2" marker-end="url(#arrow1)" />
        </svg>
      </button>
      <span>Variant 1</span>
    </div>

    <div class="item">
      <button class="reload-btn" style="--accent:#38bdf8">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <defs>
            <marker id="arrow2" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto" markerUnits="strokeWidth">
              <path d="M0,0 L8,4 L0,8 Z" fill="currentColor" />
            </marker>
          </defs>
          <path d="M6.5 15.2 A6.8 6.8 0 1 1 18.8 9" stroke-width="2" stroke-dasharray="14 4" marker-end="url(#arrow2)" />
        </svg>
      </button>
      <span>Variant 2</span>
    </div>

    <div class="item">
      <button class="reload-btn" style="--accent:#f97316">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <defs>
            <marker id="arrow3" viewBox="0 0 8 8" refX="6.6" refY="4" markerWidth="5.5" markerHeight="5.5" orient="auto" markerUnits="strokeWidth">
              <path d="M0,0 L8,4 L0,8 Z" fill="currentColor" />
            </marker>
          </defs>
          <path d="M8.4 6.6 A6.6 6.6 0 1 1 17.8 16.8" stroke-width="2.3" marker-end="url(#arrow3)" />
          <path d="M9.2 7.4 A4.2 4.2 0 0 1 15 9" stroke-width="1.4" stroke-linecap="round" />
        </svg>
      </button>
      <span>Variant 3</span>
    </div>

    <div class="item">
      <button class="reload-btn" style="--accent:#a855f7">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <defs>
            <marker id="arrow4" viewBox="0 0 8 8" refX="6.8" refY="4" markerWidth="5.6" markerHeight="5.6" orient="auto" markerUnits="strokeWidth">
              <path d="M0,0 L8,4 L0,8 Z" fill="currentColor" />
            </marker>
          </defs>
          <path d="M7.5 17 A7.5 7.5 0 1 1 18.7 6.8" stroke-width="2" marker-end="url(#arrow4)" />
          <path d="M7.5 17 L9.3 18.8" stroke-width="1.5" />
        </svg>
      </button>
      <span>Variant 4</span>
    </div>

    <div class="item">
      <button class="reload-btn" style="--accent:#facc15">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <defs>
            <marker id="arrow5" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto" markerUnits="strokeWidth">
              <path d="M0,0 L8,4 L0,8 Z" fill="currentColor" />
            </marker>
          </defs>
          <path d="M6.8 17.2 A7.2 7.2 0 1 1 18.6 8.4" stroke-width="2.1" stroke-dasharray="32 8" marker-end="url(#arrow5)" />
        </svg>
      </button>
      <span>Variant 5</span>
    </div>

    <div class="item">
      <button class="reload-btn" style="--accent:#ef4444">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <defs>
            <marker id="arrow6" viewBox="0 0 8 8" refX="6.4" refY="4" markerWidth="5.2" markerHeight="5.2" orient="auto" markerUnits="strokeWidth">
              <path d="M0,0 L8,4 L0,8 Z" fill="currentColor" />
            </marker>
          </defs>
          <path d="M8 6.2 A6.8 6.8 0 1 1 17.4 17.3" stroke-width="2.4" marker-end="url(#arrow6)" />
          <path d="M8 6.2 L9.4 4.4" stroke-width="1.6" />
        </svg>
      </button>
      <span>Variant 6</span>
    </div>

    <div class="item">
      <button class="reload-btn" style="--accent:#0ea5e9">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <defs>
            <marker id="arrow7" viewBox="0 0 8 8" refX="6.2" refY="4" markerWidth="5" markerHeight="5" orient="auto" markerUnits="strokeWidth">
              <path d="M0,0 L8,4 L0,8 Z" fill="currentColor" />
            </marker>
          </defs>
          <path d="M5.8 13.6 A6.4 6.4 0 1 1 16.4 7" stroke-width="1.9" marker-end="url(#arrow7)" />
          <path d="M5.8 13.6 L4.2 12" stroke-width="1.3" />
        </svg>
      </button>
      <span>Variant 7</span>
    </div>

    <div class="item">
      <button class="reload-btn" style="--accent:#14b8a6">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <defs>
            <marker id="arrow8" viewBox="0 0 8 8" refX="6.8" refY="4" markerWidth="5.6" markerHeight="5.6" orient="auto" markerUnits="strokeWidth">
              <path d="M0,0 L8,4 L0,8 Z" fill="currentColor" />
            </marker>
          </defs>
          <path d="M6.4 18 A7.4 7.4 0 1 1 18.5 7.2" stroke-width="2" marker-end="url(#arrow8)" />
          <path d="M12 4.6 L13.8 5" stroke-width="1.2" />
        </svg>
      </button>
      <span>Variant 8</span>
    </div>

    <div class="item">
      <button class="reload-btn" style="--accent:#fb7185">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <defs>
            <marker id="arrow9" viewBox="0 0 8 8" refX="6.8" refY="4" markerWidth="5.6" markerHeight="5.6" orient="auto" markerUnits="strokeWidth">
              <path d="M0,0 L8,4 L0,8 Z" fill="currentColor" />
            </marker>
          </defs>
          <path d="M7 16.2 A6.9 6.9 0 1 1 18.2 8.8" stroke-width="2.2" marker-end="url(#arrow9)" />
          <path d="M7 16.2 L8.4 18.1" stroke-width="1.4" />
        </svg>
      </button>
      <span>Variant 9</span>
    </div>

    <div class="item">
      <button class="reload-btn" style="--accent:#60a5fa">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <defs>
            <marker id="arrow10" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto" markerUnits="strokeWidth">
              <path d="M0,0 L8,4 L0,8 Z" fill="currentColor" />
            </marker>
          </defs>
          <path d="M6.3 17.1 A7.3 7.3 0 1 1 19 10" stroke-width="2" stroke-dasharray="18 6" marker-end="url(#arrow10)" />
          <circle cx="12" cy="12" r="2" stroke-width="1.2" />
        </svg>
      </button>
      <span>Variant 10</span>
    </div>

  </div>
</body>
</html>
