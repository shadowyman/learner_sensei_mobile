# Example configurations for different scenarios

# === SCENARIO 1: Only analyze TypeScript files ===
sonar.sources=.
sonar.inclusions=**/*.ts,**/*.tsx
sonar.exclusions=**/node_modules/**,**/*.test.ts,**/dist/**

# === SCENARIO 2: Exclude specific directories ===
sonar.sources=.
sonar.exclusions=**/node_modules/**,**/vendor/**,**/third-party/**,**/temp/**,**/.git/**,**/docs/**

# === SCENARIO 3: Only analyze src directory ===
sonar.sources=src
sonar.tests=test
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts

# === SCENARIO 4: Exclude generated files ===
sonar.exclusions=**/*.min.js,**/*.min.css,**/generated/**,**/dist/**,**/*.map

# === SCENARIO 5: Multiple source directories ===
sonar.sources=src,lib,components
sonar.tests=tests,spec

# === SCENARIO 6: Language-specific exclusions ===
# Exclude Python cache files
sonar.exclusions=**/__pycache__/**,**/*.pyc

# === SCENARIO 7: Exclude by file size ===
# Files larger than 1MB are excluded by default
# To change this:
sonar.filesize.limit=2

# === SCENARIO 8: Complex patterns ===
sonar.sources=.
sonar.inclusions=src/**/*.ts,lib/**/*.js,!**/*.min.js
sonar.exclusions=**/node_modules/**,**/*{.,-}min.js,**/test/**,**/tests/**,**/spec/**