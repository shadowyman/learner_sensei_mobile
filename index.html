<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recursive Sensei</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <!-- Quill.js for rich tex editing in notepad -->
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
    <script type="importmap">
    {
      "imports": {
        "@google/genai": "https://esm.sh/@google/genai@^1.6.0",
        "marked": "https://esm.sh/marked@^15.0.12",
        "mermaid": "https://esm.sh/mermaid@^11.11.0",
        "jszip": "https://esm.sh/jszip@^3.10.1",
        "@google/generative-ai": "https://esm.sh/@google/generative-ai@^0.24.1"
      }
    }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script type="module" src="./mermaidManager.ts"></script>
    <script type="module" src="./mermaid-theme-integration.js"></script>


</head>
<body>
    <div id="chat-container" data-font-size="medium">
        <header class="chat-window-header">
            <div class="weighted-container">
                <div class="weighted-segment brand">
                    <div class="brand-content">
                        <div class="brand-icon" aria-hidden="true">🧑‍🏫</div>
                        <h1 id="header-title" class="chat-window-title">Recursive<br>Sensei</h1>
                    </div>
                </div>
                <div class="weighted-segment status">
                    <div class="status-content">
                        <div id="curriculum-status-container">
                            <div class="nav-group nav-group-prev">
                                <button id="concept-nav-prev" class="concept-nav-arrow prev" title="Previous Concept" aria-label="Previous Concept" style="display: none;">
                                    <svg class="nav-icon nav-icon-double" viewBox="0 0 24 24" aria-hidden="true">
                                        <polyline points="19 4 12 12 19 20" />
                                        <polyline points="12 4 5 12 12 20" />
                                    </svg>
                                </button>
                                <button id="chunk-nav-prev" class="chunk-nav-arrow prev" title="Previous Chunk" aria-label="Previous Chunk" style="display: none;">
                                    <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
                                        <polyline points="15 6 9 12 15 18" />
                                    </svg>
                                </button>
                            </div>
                            <div class="status-text-group">
                                <span class="status-label">Current Focus</span>
                                <span id="curriculum-status-topic" class="status-text">Loading curriculum...</span>
                            </div>
                            <div class="nav-group nav-group-next">
                                <button id="chunk-nav-next" class="chunk-nav-arrow next" title="Next Chunk" aria-label="Next Chunk" style="display: none;">
                                    <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
                                        <polyline points="9 6 15 12 9 18" />
                                    </svg>
                                </button>
                                <button id="concept-nav-next" class="concept-nav-arrow next" title="Next Concept" aria-label="Next Concept" style="display: none;">
                                    <svg class="nav-icon nav-icon-double" viewBox="0 0 24 24" aria-hidden="true">
                                        <polyline points="5 4 12 12 5 20" />
                                        <polyline points="12 4 19 12 12 20" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="weighted-segment controls">
                    <div class="chat-window-controls">
                        <button id="font-size-toggle" class="chat-header-button control-btn" title="Toggle Font Size" aria-label="Toggle Font Size">
                            <span class="ellipsis-dots">...</span>
                            <span class="font-size-icon icon-placeholder" data-icon="font_increase"></span>
                        </button>
                        <button id="debug-mode-button" class="chat-header-button control-btn" title="Toggle Debug Mode">
                             <span class="icon-placeholder" data-icon="bug"></span>
                        </button>
                        <button id="main-chat-fullscreen-button" class="chat-header-button control-btn" title="Toggle Fullscreen">
                             <span class="icon-placeholder" data-icon="fullscreen"></span>
                        </button>
                        <button id="notepad-button" class="chat-header-button control-btn" title="Open Notepad">
                            <span class="icon-placeholder" data-icon="notepad">📓</span>
                        </button>
                        <button id="save-button" class="chat-header-button control-btn" title="Save Progress">
                            <span class="icon-placeholder" data-icon="save">💾</span>
                        </button>
                        <button id="load-button" class="chat-header-button control-btn" title="Load Progress">
                            <span class="icon-placeholder" data-icon="load">📂</span>
                        </button>
                        <input type="file" id="load-file-input" accept=".json" style="display: none;">
                    </div>
                </div>
            </div>
        </header>

        <!-- KC Phase Mastery Progress Bar -->
        <div class="progress-container" id="kc-progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="kc-progress-fill" style="width: 0%;" data-progress="0"></div>
                <div class="progress-milestone milestone-25"></div>
                <div class="progress-milestone milestone-50"></div>
                <div class="progress-milestone milestone-75"></div>
                <div class="progress-percentage" id="kc-progress-text">0%</div>
            </div>
        </div>


        <div id="message-area" class="chat-messages" role="log" aria-live="polite">
            <!-- Sensei Meditation Overlay -->
            <div id="sensei-meditation-overlay" class="meditation-overlay" style="display: none;">
                <div class="meditation-header">
                    <span class="meditation-icon">🧘‍♂️</span>
                    <h3 class="meditation-title">Sensei meditating on:</h3>
                </div>
                <div class="meditation-content" id="meditation-action-items">
                    <!-- Action items will be populated here -->
                </div>
            </div>
            <!-- Messages will be appended here -->
        </div>
        
        <div id="footer-status-bar">
            <div class="footer-segment">
                <span class="footer-label">Confidence:</span>
                <span id="footer-confidence" class="status-value">Medium</span>
            </div>
            <div class="footer-segment">
                <span class="footer-label">Confusion:</span>
                <span id="footer-confusion" class="status-value">Low</span>
            </div>
            <div class="footer-segment">
                <span class="footer-label">User Intent:</span>
                <span id="footer-intent-value" class="status-value intent-value">N/A</span>
            </div>
        </div>

        <form id="input-area" class="chat-input-form">
            <div class="input-container">
                <textarea id="user-input" class="chat-input-textarea" placeholder="Ask Sensei a question or type your thoughts..." aria-label="Your message"></textarea>
            </div>
            <button id="send-button" class="chat-input-send-button" type="submit" aria-label="Send message" title="Send message">
                <span class="icon-placeholder" data-icon="send"></span>
            </button>
        </form>
    </div>

    <!-- Response Modal (for Selection Sensei) -->
    <div id="response-modal" style="display: none;">
        <div id="response-modal-header">
            <h2 id="response-modal-title">Sensei Explains...</h2>
            <button id="response-modal-close-button" aria-label="Close modal">&times;</button>
        </div>
        <div id="response-modal-content-area">
            <!-- Sensei bubble with transparent background for modal context -->
            <div id="response-modal-sensei-bubble" class="message-bubble" data-sender="sensei">
                <div class="sender-name">Sensei</div>
                <div class="message-text markdown-content">
                    <div id="response-modal-spinner" class="inline-spinner" style="display: none;"></div>
                    <div id="response-modal-text-content">
                        <!-- Content will be injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Debug Mode Modal -->
    <div id="debug-mode-modal" style="display: none;">
        <div id="debug-modal-content-wrapper"> <!-- Added wrapper -->
            <header id="debug-modal-header" class="chat-window-header">
                 <div class="weighted-container">
                    <div class="weighted-segment brand">
                        <div class="brand-content">
                            <div class="brand-icon" aria-hidden="true">⚙️</div>
                            <h1 id="debug-modal-title" class="chat-window-title">Debugger Console</h1>
                        </div>
                    </div>
                    <div class="weighted-segment status">
                        <div class="status-content">
                            <div id="debug-tab-navigation">
                                <button id="debug-chat-tab" class="debug-tab active" data-tab="chat" aria-selected="true">Chat</button>
                                <button id="debug-console-tab" class="debug-tab" data-tab="console" aria-selected="false">Console Logs</button>
                            </div>
                        </div>
                    </div>
                     <div class="weighted-segment controls">
                        <div class="chat-window-controls">
                            <button id="debug-file-toggle-button" class="chat-header-button control-btn" title="Hide File Selection" aria-expanded="true">
                               <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><path fill="currentColor" d="M6 2c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 2h12v7H6zm0 9h12v7H6z"/></svg>
                            </button>
                             <button id="debug-download-files-button" class="chat-header-button control-btn" title="Download selected files as ZIP">
                               💾
                            </button>
                            <button id="debug-export-context-button" class="chat-header-button control-btn" title="Generate context for export">
                                📋
                            </button>
                            <button id="debug-modal-fullscreen-button" class="chat-header-button control-btn" title="Toggle Fullscreen">
                                 <span class="icon-placeholder" data-icon="fullscreen"></span>
                            </button>
                            <button id="debug-modal-close-button" class="chat-header-button control-btn" title="Close Debug Console">
                                &times;
                            </button>
                        </div>
                    </div>
                </div>
            </header>
            <div id="debug-modal-content">
                <div id="debug-chat-interface" class="debug-tab-content active">
                    <div id="debug-file-selection-area">
                        <label for="debug-file-list">Project Files for Context:</label>
                        <div id="debug-file-selection-controls">
                            <input type="checkbox" id="debug-select-all-files" checked>
                            <label for="debug-select-all-files">Select/Deselect All</label>
                        </div>
                        <div id="debug-file-list" role="listbox" aria-label="Select files for AI context">
                            <!-- File pills will be populated here -->
                        </div>
                    </div>
                    <div id="debug-message-area" class="chat-messages" role="log" aria-live="polite">
                        <!-- Debug messages will appear here -->
                    </div>
                    <form id="debug-input-form" class="chat-input-form">
                        <div class="input-container">
                            <textarea id="debug-user-input" class="chat-input-textarea" placeholder="Ask Gemini about the selected files..." aria-label="Your message to Gemini"></textarea>
                        </div>
                        <button id="debug-send-button" class="chat-input-send-button" type="submit" aria-label="Send message to Gemini" title="Send message to Gemini">
                           <span class="icon-placeholder" data-icon="send"></span>
                        </button>
                    </form>
                </div>
                <div id="debug-console-interface" class="debug-tab-content">
                    <div id="debug-console-controls" class="console-controls-bar">
                        <button id="export-logs-button" class="console-control-btn" title="Download all logs">
                            💾 Download Logs
                        </button>
                        <button id="perf-summary-button" class="console-control-btn" title="Show performance summary">
                            ⏱️ Perf Summary
                        </button>
                        <button id="perf-clear-button" class="console-control-btn" title="Clear performance metrics">
                            🗑️ Clear Perf
                        </button>
                        <span id="export-status" class="export-status-text"></span>
                    </div>
                    <div id="debug-console-logs-area" class="console-logs-container">
                        <!-- Console logs will appear here -->
                    </div>
                </div>
            </div>
        </div> <!-- End wrapper -->
    </div>
    <script type="module" src="./index.tsx"></script>
</body>
</html>
